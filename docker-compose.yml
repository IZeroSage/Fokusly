services:
  db:
    image: postgres:16-alpine
    container_name: fokusly-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fokusly}
      POSTGRES_USER: ${POSTGRES_USER:-fokusly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fokusly}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fokusly} -d ${POSTGRES_DB:-fokusly}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fokusly-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-fokusly}:${POSTGRES_PASSWORD:-fokusly}@db:5432/${POSTGRES_DB:-fokusly}
      FOKUSLY_SECRET_KEY: ${FOKUSLY_SECRET_KEY:-docker-dev-secret-key}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
